# This rule is not used by the project oci-compute-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to compute.nvcne-demo.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: oci-compute-operator
    app.kubernetes.io/managed-by: kustomize
  name: ocisecuritypolicy-viewer-role
rules:
- apiGroups:
  - compute.nvcne-demo.io
  resources:
  - ocisecuritypolicies
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - compute.nvcne-demo.io
  resources:
  - ocisecuritypolicies/status
  verbs:
  - get
