apiVersion: compute.nvcne-demo.io/v1alpha1
kind: OCISecurityPolicy
metadata:
  labels:
    app.kubernetes.io/name: oci-compute-operator
    app.kubernetes.io/managed-by: kustomize
  name: ocisecuritypolicy-sample
  namespace: default
spec:
  compartmentId: "ocid1.compartment.oc1..test"
  vcnId: "ocid1.vcn.oc1..test"
  displayName: "e2e-test-security-policy"
  rules:
    - direction: "INGRESS"
      protocol: "6"
      source: "0.0.0.0/0"
      minPort: 443
      maxPort: 443
      description: "Allow HTTPS inbound"
    - direction: "EGRESS"
      protocol: "all"
      destination: "0.0.0.0/0"
      description: "Allow all outbound"
  freeformTags:
    env: "e2e"
    team: "nvcne"